<!DOCTYPE html>
<!-- Travis Skovira
COSC 365
Budgeting App with Login -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Budgeting App</title>
    <link rel="stylesheet" href="budget.css">
    <script defer src="budget.js"></script>
</head>
<body>
    <div class="container" id="authContainer">
        <h1>Login / Sign Up</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginUser()">Login</button>
        <button onclick="signupUser()">Sign Up</button>
        <p id="authMessage"></p>
    </div>

    <div class="container" id="appContainer" style="display:none;">
        <h1>College Budget Tracker</h1>

        <div class="section">
            <h2>Income</h2>
            <input type="text" id="incomeSource" placeholder="Source">
            <input type="number" id="incomeAmount" placeholder="Amount">
            <button onclick="addIncome()">Add Income</button>
            <ul id="incomeList"></ul>
        </div>

        <div class="section">
            <h2>Expenses</h2>
            <input type="text" id="expenseCategory" placeholder="Category">
            <input type="number" id="expenseAmount" placeholder="Amount">
            <button onclick="addExpense()">Add Expense</button>
            <ul id="expenseList"></ul>
        </div>

        <div class="section summary">
            <h2>Summary</h2>
            <p>Total Income: $<span id="totalIncome">0.00</span></p>
            <p>Total Expenses: $<span id="totalExpenses">0.00</span></p>
            <p>Balance: $<span id="balance">0.00</span></p>
        </div>
    </div>
</body>
</html>
